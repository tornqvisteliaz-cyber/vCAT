<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin | Copenhagen AirTaxi Virtual</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="container nav-inner">
        <h1 class="brand">Admin Panel</h1>
        <div class="nav-actions">
          <a class="btn secondary" href="index.html">Public Site</a>
        </div>
      </div>
    </header>

    <main class="container admin-layout" id="adminRoot">
      <section class="panel">
        <h3>General Website Content</h3>
        <label>Website name <input id="siteNameInput" /></label>
        <label>Tagline <input id="taglineInput" /></label>
        <label>About text <textarea id="aboutInput" rows="5"></textarea></label>
        <label>Contact email <input id="contactInput" /></label>
        <div class="inline">
          <button class="btn" id="saveGeneral">Save general content</button>
          <button class="btn secondary" id="resetData">Reset default data</button>
        </div>
      </section>

      <section class="panel">
        <h3>Add Airline</h3>
        <label>Name <input id="airlineName" placeholder="e.g. Airseven" /></label>
        <label>Description <textarea id="airlineDescription" rows="3"></textarea></label>
        <label>Bases (comma-separated ICAOs) <input id="airlineBases" placeholder="EDDM, ESGJ, ESSA" /></label>
        <label>Fleet (comma-separated) <input id="airlineFleet" placeholder="A320, B737-800" /></label>
        <button class="btn" id="addAirline">Add airline</button>
        <div id="adminAirlineList" class="grid section"></div>
      </section>

      <section class="panel">
        <h3>Add Route</h3>
        <div class="inline">
          <label>From <input id="routeFrom" placeholder="EKCH" /></label>
          <label>To <input id="routeTo" placeholder="ESSA" /></label>
        </div>
        <label>Airline
          <select id="routeAirline"></select>
        </label>
        <button class="btn" id="addRoute">Add route</button>
        <h4>Current routes</h4>
        <ul class="list" id="adminRouteList"></ul>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      window.vcat.setupAdminPage();
    </script>
  </body>
</html>
